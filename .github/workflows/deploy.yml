name: Test and deploy backend

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_sqlite, sqlite3, gd
          coverage: none

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare CI database
        run: |
          cp .env.example .env
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs
          touch database/database.sqlite
          php artisan key:generate
          php artisan migrate --force

      - name: Test backend
        run: php artisan test

      - name: Build admin assets
        run: |
          npm ci
          npm run build

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy backend
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "/var/www/milosevac.com/deploy-backend.sh '${GITHUB_SHA}'"
